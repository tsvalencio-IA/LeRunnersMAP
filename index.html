<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeRunners - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="img/logo-192.png">
    <link rel="apple-touch-icon" href="img/logo-192.png">

    <link href="https://cdn.jsdelivr.net/npm/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
    <meta name="theme-color" content="#00008B">
</head>
<body class="login-page">

    <div class="login-container">
        <img src="img/logo-192.png" alt="LeRunners" class="logo">
        <h2>LeRunners</h2>
        
        <!-- Formulário de Login -->
        <form id="login-form">
            <div class="form-group input-icon">
                <i class='bx bx-envelope'></i>
                <input type="email" id="loginEmail" placeholder="E-mail" required>
            </div>
            <div class="form-group input-icon">
                <i class='bx bx-lock-alt'></i>
                <input type="password" id="loginPassword" placeholder="Senha" required>
            </div>
            <div id="login-error" class="error-message"></div>
            <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Entrar</button>
            <div class="toggle-link">
                Ainda não tem conta? <a id="toggleToRegister">Cadastre-se</a>
            </div>
        </form>

        <!-- Formulário de Registro -->
        <form id="register-form" class="hidden">
            <div class="form-group input-icon">
                <i class='bx bx-user'></i>
                <input type="text" id="registerName" placeholder="Nome Completo" required>
            </div>
            <div class="form-group input-icon">
                <i class='bx bx-envelope'></i>
                <input type="email" id="registerEmail" placeholder="E-mail" required>
            </div>
            <div class="form-group input-icon">
                <i class='bx bx-lock-alt'></i>
                <input type="password" id="registerPassword" placeholder="Senha (Mín. 6 caracteres)" required>
            </div>
            <div id="register-error" class="error-message"></div>
            <button type="submit" class="btn btn-secondary" style="margin-top: 1rem;">Criar Conta</button>
            <div class="toggle-link">
                Já tem conta? <a id="toggleToLogin">Fazer Login</a>
            </div>
        </form>

        <!-- Tela de Conta Pendente -->
        <div id="pending-view" class="hidden" style="text-align: center;">
            <i class='bx bx-time-five' style="font-size: 3rem; color: var(--warning-color); margin-bottom: 1rem;"></i>
            <h3 style="color: var(--warning-color); margin-bottom: 1rem;">Conta em Análise</h3>
            <p>Seu cadastro para <strong id="pending-email-display"></strong> foi recebido e está aguardando aprovação do treinador.</p>
            <button id="btn-logout-pending" class="btn btn-danger" style="margin-top: 1rem; width: auto; padding: 0.5rem 1.5rem;">Sair</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <script src="js/config.js"></script>
    <script src="js/app.js"></script> 
</body>
</html>
